name: CyberGuard CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore dependencies
      run: dotnet restore "PART-1.csproj"
    
    - name: Build
      run: dotnet build "PART-1.csproj" --no-restore --configuration Release
    
    - name: Check syntax errors
      run: dotnet build "PART-1.csproj" --no-incremental --warninglevel 4
