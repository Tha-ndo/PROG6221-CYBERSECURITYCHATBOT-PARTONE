name: CI Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build project
      run: dotnet build --no-restore --configuration Release
    
    - name: Check for compilation errors
      run: dotnet build --no-incremental --warninglevel 4
      continue-on-error: false

  code-formatting:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Install dotnet-format tool
      run: dotnet tool install -g dotnet-format
    
    - name: Check code formatting
      run: dotnet format --verify-no-changes --verbosity diagnostic

  static-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Run static analysis
      run: dotnet build --configuration Release -warnaserror

  create-project-file:
    runs-on: ubuntu-latest
    needs: [build, code-formatting]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Create .csproj file
      run: |
        cat > CyberGuard.csproj << 'EOF'
        <Project Sdk="Microsoft.NET.Sdk">
          <PropertyGroup>
            <OutputType>Exe</OutputType>
            <TargetFramework>net8.0</TargetFramework>
            <LangVersion>latest</LangVersion>
            <Nullable>enable</Nullable>
            <ImplicitUsings>enable</ImplicitUsings>
          </PropertyGroup>
          
          <ItemGroup>
            <PackageReference Include="System.Speech" Version="8.0.0" />
          </ItemGroup>
        </Project>
        EOF
    
    - name: Verify project structure
      run: |
        if [ ! -f "CyberGuard.csproj" ]; then
          echo "❌ Project file not created"
          exit 1
        fi
        echo "✅ Project file exists"
    
    - name: Test restore and build with new project file
      run: |
        dotnet restore CyberGuard.csproj
        dotnet build CyberGuard.csproj --no-restore --configuration Release
